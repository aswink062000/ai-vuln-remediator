# Localhost Ollama Configuration
name: LocalOllama
version: 1.0.0
schema: v1

models:
  - name: QwenCoder
    provider: ollama
    model: qwen2.5-coder:7b
    api_base: http://localhost:11434
    roles:
      - autocomplete
      - chat
      - edit
      - apply

  - name: DeepSeekCoder
    provider: ollama
    model: deepseek-coder-v2:16b
    api_base: http://localhost:11434
    roles:
      - chat
      - edit
      - apply

  - name: Gemma
    provider: ollama
    model: gemma4:31b-cloud
    api_base: http://localhost:11434
    roles:
      - chat
      - edit
      - apply